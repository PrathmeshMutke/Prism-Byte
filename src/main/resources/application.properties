spring.application.name=banking_app

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:banking_app;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.servlet.context-path=/api

app.jwt.secret=${APP_JWT_SECRET:ChangeThisJwtSecretKeyForProductionUseAtLeast32BytesLong}
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=604800000
app.bootstrap-admin-email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@prismbyte.com}
app.bootstrap-admin-password=${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
app.bootstrap-employee-email=${APP_BOOTSTRAP_EMPLOYEE_EMAIL:employee@prismbyte.com}
app.bootstrap-employee-password=${APP_BOOTSTRAP_EMPLOYEE_PASSWORD:Employee@12345}
app.bootstrap-customer-email=${APP_BOOTSTRAP_CUSTOMER_EMAIL:customer@prismbyte.com}
app.bootstrap-customer-password=${APP_BOOTSTRAP_CUSTOMER_PASSWORD:Customer@12345}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.file.name=logs/banking-app.log
logging.level.root=INFO
logging.level.com.prismbyte.banking_app=INFO
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:OFF}
